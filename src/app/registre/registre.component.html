<div class="pageContanaire">
  <div class="connexionDetails">
    <h2 class="title">Créer un compte</h2>
    
    <div class="successMsg" *ngIf="unmatch">
      <span class="material-symbols-outlined" style="vertical-align: middle; font-size: 1.1rem; margin-right: 4px;">check_circle</span> Inscription réussie ! Redirection vers la page de connexion...
    </div>

    <form (ngSubmit)="registre()" class="formGrid" #userForm="ngForm" novalidate>
      <div class="inputGroup">
        <label>Nom :</label>
        <input type="text" [(ngModel)]="user.fname" name="fname" placeholder="Nom" required>
      </div>

      <div class="inputGroup">
        <label>Prénom :</label>
        <input type="text" [(ngModel)]="user.lname" name="lname" placeholder="Prénom" required>
      </div>

      <div class="inputGroup">
        <label>Téléphone :</label>
        <input type="tel" (keyup)="testtel()" [(ngModel)]="user.tel" name="tel" placeholder="Ex: 0600000000" [ngClass]="{'invalid-field': testtel1}" required>
        <div class="validation-error" *ngIf="testtel1">Ce numéro de téléphone existe déjà.</div>
      </div>

      <div class="inputGroup">
        <label>Adresse e-mail :</label>
        <input type="email" (keyup)="testtel()" [(ngModel)]="user.email" name="email" placeholder="Ex: name@example.com" [ngClass]="{'invalid-field': testemail}" required>
        <div class="validation-error" *ngIf="testemail">Cet e-mail existe déjà.</div>
      </div>

      <div class="inputGroup fullWidth">
        <label>Adresse de livraison :</label>
        <input type="text" [(ngModel)]="user.adress" name="adress" placeholder="Ex: 12 Rue de Meknès, Centre Ville" required>
      </div>

      <div class="inputGroup fullWidth">
        <label>Mot de passe :</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="connecter" [ngClass]="{buttoninv: (testemail||testtel1||vein)}">
        S'inscrire <span class="material-symbols-outlined">person_add</span>
      </button>

      <div class="loginRedirect">
        Déjà membre ? <a routerLink="/connexion">Se connecter</a>
      </div>
    </form>
  </div>
</div>
