<div class="pageContanaire">
  <div class="connexionDetails">
    <h2 class="title">Connexion</h2>
    
    <div class="errorMsg" *ngIf="incorect">
      <span class="material-symbols-outlined" style="font-size: 1.1rem; margin-right: 4px;">error</span> E-mail/téléphone ou mot de passe incorrect.
    </div>

    <div class="inputGroup">
      <label>E-mail ou Téléphone :</label>
      <input type="text" [(ngModel)]="user.email" (ngModelChange)="test()" placeholder="Ex: example@email.com ou 0600000000">
    </div>

    <div class="inputGroup">
      <label>Mot de passe :</label>
      <input type="password" [(ngModel)]="password" (ngModelChange)="test()" placeholder="••••••••">
    </div>

    <button class="connecter" (click)="connect()" [ngClass]="{buttoninv: emailinv}" id="connecter">
      Se connecter <span class="material-symbols-outlined">login</span>
    </button>

    <div class="registerRedirect">
      Nouveau client ? <a routerLink="/inscrire">Créer un compte</a>
    </div>
  </div>
</div>
